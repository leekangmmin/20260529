<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 30" width="900" height="30">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="0" y="0" width="900" height="30" fill="rgba(0,0,0,0)"/>
  <g filter="url(#glow)">
    <line x1="30" y1="15" x2="870" y2="15" stroke="#00ff41" stroke-width="0.5" opacity="0.3"/>
    <!-- Left bracket -->
    <path d="M30,10 L20,15 L30,20" fill="none" stroke="#00ff41" stroke-width="1.5" opacity="0.4"/>
    <!-- Right bracket -->
    <path d="M870,10 L880,15 L870,20" fill="none" stroke="#00ff41" stroke-width="1.5" opacity="0.4"/>
    <!-- Center triangle - animated -->
    <polygon points="450,10 455,15 450,20 445,15" fill="#00ff41" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.2;0.5" dur="2s" repeatCount="indefinite"/>
    </polygon>
    <!-- Small data ticks -->
    <line x1="150" y1="12" x2="150" y2="18" stroke="#00ff41" stroke-width="0.5" opacity="0.15"/>
    <line x1="300" y1="12" x2="300" y2="18" stroke="#00ff41" stroke-width="0.5" opacity="0.15"/>
    <line x1="600" y1="12" x2="600" y2="18" stroke="#00ff41" stroke-width="0.5" opacity="0.15"/>
    <line x1="750" y1="12" x2="750" y2="18" stroke="#00ff41" stroke-width="0.5" opacity="0.15"/>
  </g>
</svg>
