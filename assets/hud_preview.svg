<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="scanlines" patternUnits="userSpaceOnUse" width="800" height="4">
      <rect x="0" y="0" width="800" height="1.5" fill="rgba(0,255,65,0.04)"/>
      <rect x="0" y="1.5" width="800" height="2.5" fill="rgba(0,0,0,0)"/>
    </pattern>
  </defs>

  <!-- Dark background -->
  <rect x="0" y="0" width="800" height="400" fill="#080808"/>

  <!-- Outer frame -->
  <rect x="5" y="5" width="790" height="390" rx="6" fill="none" stroke="#00ff41" stroke-width="1" opacity="0.3"/>

  <!-- Corner brackets -->
  <g stroke="#00ff41" stroke-width="2" opacity="0.5" filter="url(#glow)">
    <path d="M5,25 L5,5 L25,5"/>
    <path d="M795,25 L795,5 L775,5"/>
    <path d="M5,375 L5,395 L25,395"/>
    <path d="M795,375 L795,395 L775,395"/>
  </g>

  <!-- Pitch ladder -->
  <g stroke="#00ff41" stroke-width="0.6" opacity="0.25">
    <line x1="80" y1="180" x2="720" y2="180"/>
    <line x1="150" y1="195" x2="650" y2="195"/>
    <line x1="230" y1="210" x2="570" y2="210"/>
    <line x1="320" y1="225" x2="480" y2="225"/>
  </g>

  <!-- Pitch numbers -->
  <g fill="#00ff41" font-family="monospace" font-size="8" opacity="0.3">
    <text x="68" y="182">05</text><text x="728" y="182">05</text>
    <text x="138" y="197">10</text><text x="652" y="197">10</text>
  </g>

  <!-- Horizon line -->
  <g filter="url(#glow)">
    <line x1="60" y1="180" x2="340" y2="180" stroke="#00ff41" stroke-width="1.5" opacity="0.5"/>
    <line x1="460" y1="180" x2="740" y2="180" stroke="#00ff41" stroke-width="1.5" opacity="0.5"/>
    <line x1="345" y1="180" x2="375" y2="180" stroke="#00ff41" stroke-width="2" opacity="0.6"/>
    <line x1="425" y1="180" x2="455" y2="180" stroke="#00ff41" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- Conformal Runway -->
  <g filter="url(#glow)">
    <polygon points="250,205 550,205 620,260 180,260" fill="rgba(0,255,65,0.04)" stroke="#00ff41" stroke-width="1.5" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.5;0.7" dur="2s" repeatCount="indefinite"/>
    </polygon>
    <!-- Threshold markings -->
    <g stroke="#00ff41" stroke-width="1" opacity="0.5">
      <line x1="220" y1="245" x2="580" y2="245"/>
      <line x1="210" y1="250" x2="590" y2="250"/>
    </g>
    <!-- Centerline -->
    <line x1="400" y1="207" x2="400" y2="258" stroke="#00ff41" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>
    <!-- Touchdown zone markings -->
    <rect x="360" y="235" width="80" height="3" fill="#00ff41" opacity="0.4"/>
    <rect x="370" y="242" width="60" height="2" fill="#00ff41" opacity="0.3"/>
    <!-- Flare cue -->
    <rect x="385" y="210" width="30" height="5" fill="#00ff41" opacity="0.6" rx="2">
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Flight Path Vector -->
  <g filter="url(#glowStrong)">
    <circle cx="400" cy="195" r="6" fill="none" stroke="#00ff41" stroke-width="1.5" opacity="0.7"/>
    <circle cx="400" cy="195" r="1.5" fill="#00ff41" opacity="0.8"/>
    <line x1="400" y1="201" x2="400" y2="212" stroke="#00ff41" stroke-width="0.8" opacity="0.4"/>
    <line x1="400" y1="189" x2="400" y2="183" stroke="#00ff41" stroke-width="0.8" opacity="0.4"/>
    <line x1="393" y1="195" x2="387" y2="195" stroke="#00ff41" stroke-width="0.8" opacity="0.4"/>
    <line x1="407" y1="195" x2="413" y2="195" stroke="#00ff41" stroke-width="0.8" opacity="0.4"/>
  </g>

  <!-- Ghost FPV trail (phosphor persistence simulation) -->
  <g fill="none" stroke="rgba(0,255,65,0.06)" stroke-width="1">
    <circle cx="395" cy="192" r="6"/>
    <circle cx="391" cy="190" r="5.5"/>
    <circle cx="388" cy="188" r="5"/>
  </g>

  <!-- ILS Localizer bar (left side) -->
  <g filter="url(#glow)">
    <!-- Glideslope bars -->
    <rect x="85" y="130" width="5" height="20" fill="#00ff41" rx="1" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.3;0.5" dur="0.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="92" y="132" width="3" height="16" fill="#00ff41" rx="1" opacity="0.3"/>
    <rect x="97" y="134" width="3" height="12" fill="#00ff41" rx="1" opacity="0.2"/>
    <!-- Localizer diamond -->
    <polygon points="400,125 405,135 395,135" fill="#00ff41" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.2;0.5" dur="1.5s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <!-- Wind data -->
  <g fill="#00ff41" font-family="monospace" font-size="9" opacity="0.4">
    <text x="580" y="135">WIND 270/15KT</text>
  </g>

  <!-- Altitude tape (left) -->
  <g font-family="monospace" fill="#00ff41">
    <rect x="18" y="140" width="55" height="100" fill="none" stroke="#00ff41" stroke-width="0.5" opacity="0.15"/>
    <text x="22" y="152" font-size="10" opacity="0.4">045</text>
    <text x="22" y="166" font-size="10" opacity="0.4">044</text>
    <text x="22" y="180" font-size="10" opacity="0.4">043</text>
    <line x1="18" y1="183" x2="25" y2="183" stroke="#00ff41" stroke-width="1" opacity="0.5"/>
    <text x="22" y="198" font-size="14" font-weight="bold" opacity="0.8">042</text>
    <text x="50" y="198" font-size="8" opacity="0.5">FL</text>
    <text x="22" y="212" font-size="10" opacity="0.4">041</text>
    <!-- Vertical speed indicator -->
    <text x="22" y="230" font-size="8" opacity="0.3">+800</text>
    <text x="35" y="230" font-size="7" opacity="0.2">fpm</text>
  </g>

  <!-- Speed tape (right) -->
  <g font-family="monospace" fill="#00ff41">
    <rect x="730" y="140" width="55" height="100" fill="none" stroke="#00ff41" stroke-width="0.5" opacity="0.15"/>
    <text x="735" y="152" font-size="10" opacity="0.4">140</text>
    <text x="735" y="166" font-size="10" opacity="0.4">141</text>
    <text x="735" y="180" font-size="10" opacity="0.4">142</text>
    <line x1="745" y1="183" x2="755" y2="183" stroke="#00ff41" stroke-width="1" opacity="0.5"/>
    <text x="735" y="198" font-size="14" font-weight="bold" opacity="0.8">143</text>
    <text x="763" y="198" font-size="8" opacity="0.5">kt</text>
    <text x="735" y="212" font-size="10" opacity="0.4">144</text>
    <!-- Mach number -->
    <text x="735" y="230" font-size="8" opacity="0.3">M.24</text>
  </g>

  <!-- Heading scale -->
  <g font-family="monospace" fill="#00ff41" opacity="0.5">
    <rect x="200" y="55" width="400" height="20" rx="2" fill="none" stroke="#00ff41" stroke-width="0.3" opacity="0.1"/>
    <text x="220" y="68" font-size="9" opacity="0.3">350</text>
    <text x="253" y="68" font-size="9" opacity="0.3">355</text>
    <line x1="283" y1="58" x2="283" y2="63" stroke="#00ff41" opacity="0.3"/>
    <text x="288" y="68" font-size="10" font-weight="bold" opacity="0.6">000</text>
    <line x1="318" y1="58" x2="318" y2="63" stroke="#00ff41" opacity="0.3"/>
    <text x="323" y="68" font-size="9" opacity="0.3">005</text>
    <text x="356" y="68" font-size="9" opacity="0.3">010</text>
    <!-- Heading bug -->
    <polygon points="300,75 305,70 295,70" fill="#00ff41" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="1s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <!-- Bottom status bar -->
  <g font-family="monospace" fill="#00ff41" opacity="0.4">
    <line x1="15" y1="370" x2="785" y2="370" stroke="#00ff41" stroke-width="0.5"/>
    <text x="25" y="383" font-size="8">HGS 4000</text>
    <text x="100" y="383" font-size="8">CAT III</text>
    <text x="165" y="383" font-size="8">DH 0ft</text>
    <!-- ILS confidence dots -->
    <text x="240" y="383" font-size="8">GS ████▒▒</text>
    <text x="320" y="383" font-size="8">LOC ████▒▒</text>
    <!-- Radio altitude -->
    <text x="420" y="383" font-size="8">RA 420</text>
    <!-- Ground roll guidance -->
    <text x="500" y="383" font-size="8">ROLLOUT ARMED</text>
    <text x="650" y="383" font-size="8">APPR LNAV</text>
    <text x="730" y="383" font-size="8">12:34Z</text>
  </g>

  <!-- Animated ground speed indicator -->
  <g font-family="monospace" fill="#00ff41" opacity="0.3">
    <text x="580" y="155" font-size="8">GS 135kt</text>
  </g>

  <!-- Annunciators -->
  <g font-family="monospace" fill="#00ff41" opacity="0.35">
    <text x="320" y="100" font-size="8">LOC CAPTURE</text>
    <text x="440" y="100" font-size="8">G/S CAPTURE</text>
  </g>

  <!-- Scanline overlay -->
  <rect x="0" y="0" width="800" height="400" fill="url(#scanlines)" opacity="0.5"/>

  <!-- Subtle flicker -->
  <rect x="0" y="0" width="800" height="400" fill="rgba(0,0,0,0.01)">
    <animate attributeName="opacity" values="0;0.015;0;0.01;0" dur="0.4s" repeatCount="indefinite"/>
  </rect>

  <!-- Vignette -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="0%" stop-color="rgba(0,0,0,0)"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0.4)"/>
  </radialGradient>
  <rect x="0" y="0" width="800" height="400" fill="url(#vignette)"/>
</svg>
