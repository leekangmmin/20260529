<svg width="900" height="520" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520">
  <defs>
    <!-- Daylight approach sky -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#6ea8d4"/>
      <stop offset="60%"  stop-color="#a8cce0"/>
      <stop offset="100%" stop-color="#c8dde8"/>
    </linearGradient>
    <!-- Hazy horizon -->
    <linearGradient id="horizon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#c8dde8"/>
      <stop offset="100%" stop-color="#d4c9a8"/>
    </linearGradient>
    <!-- Ground terrain -->
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#8a9c6e"/>
      <stop offset="40%"  stop-color="#6b7a52"/>
      <stop offset="100%" stop-color="#4a5438"/>
    </linearGradient>
    <!-- Runway pavement -->
    <linearGradient id="pavement" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#5a5a5a"/>
      <stop offset="100%" stop-color="#3a3a3a"/>
    </linearGradient>
    <!-- Subtle HUD symbol glow (minimal — real glass) -->
    <filter id="subtle" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Cockpit window vignette -->
    <radialGradient id="vig" cx="50%" cy="50%" r="65%">
      <stop offset="0%"   stop-color="transparent"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.45"/>
    </radialGradient>
    <!-- Windshield glare -->
    <linearGradient id="glare" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>

  <!-- ══ OUTSIDE WORLD (cockpit view on approach, daylight) ══ -->

  <!-- Sky -->
  <rect width="900" height="520" fill="url(#sky)"/>

  <!-- Hazy horizon band -->
  <rect y="262" width="900" height="60" fill="url(#horizon)"/>

  <!-- Ground / terrain -->
  <rect y="308" width="900" height="212" fill="url(#ground)"/>

  <!-- Fields / terrain texture -->
  <g opacity="0.25" fill="none" stroke="#5a6840" stroke-width="1">
    <line x1="0" y1="360" x2="900" y2="360"/>
    <line x1="0" y1="420" x2="900" y2="420"/>
    <line x1="100" y1="308" x2="0"   y2="520"/>
    <line x1="300" y1="308" x2="100" y2="520"/>
    <line x1="500" y1="308" x2="300" y2="520"/>
    <line x1="700" y1="308" x2="500" y2="520"/>
    <line x1="900" y1="308" x2="700" y2="520"/>
  </g>

  <!-- Runway pavement (perspective) -->
  <polygon points="390,310 510,310 590,520 310,520" fill="url(#pavement)" opacity="0.9"/>
  <!-- Runway centerline markings -->
  <g stroke="#e8e8d0" stroke-width="3" stroke-dasharray="28,20" opacity="0.7">
    <line x1="450" y1="316" x2="450" y2="520"/>
  </g>
  <!-- Runway edge lines -->
  <line x1="390" y1="310" x2="310" y2="520" stroke="#e0e0c0" stroke-width="2" opacity="0.55"/>
  <line x1="510" y1="310" x2="590" y2="520" stroke="#e0e0c0" stroke-width="2" opacity="0.55"/>
  <!-- Runway threshold bar -->
  <line x1="390" y1="316" x2="510" y2="316" stroke="#e8e8d0" stroke-width="4" opacity="0.6"/>
  <!-- Touchdown zone markings -->
  <g stroke="#e8e8d0" stroke-width="3" opacity="0.45">
    <line x1="405" y1="390" x2="428" y2="390"/>
    <line x1="472" y1="390" x2="495" y2="390"/>
    <line x1="400" y1="430" x2="428" y2="430"/>
    <line x1="472" y1="430" x2="500" y2="430"/>
  </g>
  <!-- Approach lighting (ALSF) -->
  <g fill="#ffffc0" opacity="0.55">
    <rect x="448" y="300" width="4" height="8" rx="1"/>
    <rect x="448" y="285" width="4" height="6" rx="1"/>
    <rect x="448" y="272" width="4" height="5" rx="1"/>
    <rect x="436" y="290" width="4" height="5" rx="1"/>
    <rect x="460" y="290" width="4" height="5" rx="1"/>
    <rect x="424" y="280" width="4" height="4" rx="1"/>
    <rect x="472" y="280" width="4" height="4" rx="1"/>
  </g>
  <!-- PAPI (2 red, 2 white = on glidepath) -->
  <g opacity="0.8">
    <rect x="290" y="318" width="10" height="6" rx="1" fill="#ff5555"/>
    <rect x="306" y="318" width="10" height="6" rx="1" fill="#ff5555"/>
    <rect x="322" y="318" width="10" height="6" rx="1" fill="#ffffff"/>
    <rect x="338" y="318" width="10" height="6" rx="1" fill="#ffffff"/>
  </g>

  <!-- Windshield glare overlay -->
  <rect width="900" height="520" fill="url(#glare)"/>

  <!-- ══════════════════════════════════════════
       BOEING HGS SYMBOLOGY
       Color: #C8FF78 (real HGS yellow-green)
       Minimal glow — clean combiner glass look
       ══════════════════════════════════════════ -->

  <g filter="url(#subtle)">

    <!-- ── PITCH LADDER ── -->
    <g stroke="#C8FF78" stroke-width="1.8" fill="none" opacity="0.92">
      <!-- +10° -->
      <line x1="298" y1="188" x2="374" y2="188"/>
      <line x1="526" y1="188" x2="602" y2="188"/>
      <!-- +5° (shorter) -->
      <line x1="332" y1="224" x2="390" y2="224"/>
      <line x1="510" y1="224" x2="568" y2="224"/>
      <!-- 0° HORIZON — longer, full width -->
      <line x1="160" y1="262" x2="382" y2="262" stroke-width="2.2"/>
      <line x1="518" y1="262" x2="740" y2="262" stroke-width="2.2"/>
      <!-- -2.5° (aircraft on glidepath, nose slightly low) -->
      <line x1="332" y1="280" x2="390" y2="280" stroke-dasharray="none"/>
      <line x1="510" y1="280" x2="568" y2="280"/>
      <!-- -5° (dashed — below horizon) -->
      <line x1="298" y1="298" x2="374" y2="298" stroke-dasharray="6,4"/>
      <line x1="526" y1="298" x2="602" y2="298" stroke-dasharray="6,4"/>
    </g>

    <!-- Pitch numbers -->
    <g fill="#C8FF78" font-family="'Arial Narrow', Arial, sans-serif" font-size="13" opacity="0.9">
      <text x="282" y="192" text-anchor="end">10</text>
      <text x="618" y="192">10</text>
      <text x="314" y="228" text-anchor="end">5</text>
      <text x="584" y="228">5</text>
      <text x="282" y="302" text-anchor="end">-5</text>
      <text x="618" y="302">-5</text>
    </g>

    <!-- ── FLIGHT PATH VECTOR ── -->
    <!-- The most important symbol — centered at (450, 252) -->
    <g stroke="#C8FF78" fill="none" stroke-width="2.2">
      <circle cx="450" cy="252" r="13"/>
      <!-- Wings -->
      <line x1="463" y1="252" x2="490" y2="252"/>
      <line x1="410" y1="252" x2="437" y2="252"/>
      <!-- Tail -->
      <line x1="450" y1="239" x2="450" y2="228"/>
    </g>

    <!-- ── BANK ANGLE INDICATOR ── -->
    <g stroke="#C8FF78" stroke-width="1.6" fill="none" opacity="0.88">
      <path d="M 392 142 A 62 62 0 0 1 508 142"/>
      <!-- 0° index tick -->
      <line x1="450" y1="140" x2="450" y2="128"/>
      <!-- ±10° -->
      <line x1="412" y1="153" x2="406" y2="142"/>
      <line x1="488" y1="153" x2="494" y2="142"/>
      <!-- ±20° -->
      <line x1="395" y1="172" x2="387" y2="161"/>
      <line x1="505" y1="172" x2="513" y2="161"/>
      <!-- ±30° (prominent) -->
      <line x1="388" y1="194" x2="377" y2="181"/>
      <line x1="512" y1="194" x2="523" y2="181"/>
      <!-- ±45° -->
      <line x1="392" y1="142" x2="385" y2="132" opacity="0.6"/>
      <line x1="508" y1="142" x2="515" y2="132" opacity="0.6"/>
      <!-- Bank index (inverted triangle at 0°) -->
      <polygon points="450,155 443,168 457,168" fill="#C8FF78" stroke="none"/>
    </g>

    <!-- ── CONFORMAL RUNWAY OUTLINE ── -->
    <g stroke="#C8FF78" stroke-width="2.4" fill="none" opacity="0.95">
      <polygon points="388,312 512,312 595,490 305,490"/>
      <!-- Runway centerline -->
      <line x1="450" y1="318" x2="450" y2="490"
        stroke-width="1.4" stroke-dasharray="16,12" opacity="0.7"/>
      <!-- Threshold bar -->
      <line x1="388" y1="318" x2="420" y2="318" stroke-width="2.4"/>
      <line x1="480" y1="318" x2="512" y2="318" stroke-width="2.4"/>
      <!-- Touchdown zone -->
      <line x1="360" y1="415" x2="540" y2="415" stroke-width="1.4" opacity="0.55"/>
    </g>

    <!-- ── FLARE CUE (at touchdown zone) ── -->
    <g stroke="#C8FF78" stroke-width="2.6" fill="none" opacity="0.92">
      <polyline points="430,455 450,436 470,455"/>
      <line x1="450" y1="436" x2="450" y2="424"/>
    </g>

    <!-- ── ILS GLIDESLOPE SCALE (left) ── -->
    <g stroke="#C8FF78" stroke-width="1.6" fill="#C8FF78" opacity="0.88">
      <!-- Track -->
      <line x1="142" y1="194" x2="142" y2="332" fill="none"/>
      <!-- Center cross -->
      <line x1="133" y1="262" x2="151" y2="262" stroke-width="2.2"/>
      <!-- 1-dot ticks -->
      <line x1="135" y1="228" x2="149" y2="228"/>
      <line x1="135" y1="297" x2="149" y2="297"/>
      <!-- 2-dot ticks -->
      <line x1="133" y1="194" x2="151" y2="194" opacity="0.6"/>
      <line x1="133" y1="332" x2="151" y2="332" opacity="0.6"/>
      <!-- Deviation diamond — slightly below center (0.5 dot low) -->
      <polygon points="142,275 134,283 142,291 150,283" stroke="none"/>
      <!-- Label -->
      <text x="118" y="192" font-family="'Arial Narrow', Arial, sans-serif"
        font-size="11" text-anchor="end" stroke="none">G/S</text>
    </g>

    <!-- ── ILS LOCALISER SCALE (bottom) ── -->
    <g stroke="#C8FF78" stroke-width="1.6" fill="#C8FF78" opacity="0.88">
      <line x1="282" y1="498" x2="618" y2="498" fill="none"/>
      <line x1="450" y1="490" x2="450" y2="506" stroke-width="2.2"/>
      <line x1="366" y1="492" x2="366" y2="504"/>
      <line x1="534" y1="492" x2="534" y2="504"/>
      <line x1="282" y1="492" x2="282" y2="504" opacity="0.6"/>
      <line x1="618" y1="492" x2="618" y2="504" opacity="0.6"/>
      <!-- LOC diamond — centered (on centreline) -->
      <polygon points="450,498 442,490 450,482 458,490" stroke="none"/>
      <text x="450" y="518" font-family="'Arial Narrow', Arial, sans-serif"
        font-size="11" text-anchor="middle" stroke="none">LOC</text>
    </g>

    <!-- ── SPEED (left) ── -->
    <g fill="#C8FF78" font-family="'Arial Narrow', Arial, sans-serif" opacity="0.92">
      <rect x="34" y="240" width="88" height="44" fill="none" stroke="#C8FF78" stroke-width="1.5" rx="2"/>
      <text x="78" y="271" font-size="26" font-weight="bold" text-anchor="middle">147</text>
      <text x="34" y="237" font-size="11">IAS  KT</text>
      <text x="34" y="300" font-size="12">GS   152</text>
    </g>

    <!-- ── ALTITUDE (right) ── -->
    <g fill="#C8FF78" font-family="'Arial Narrow', Arial, sans-serif" opacity="0.92">
      <rect x="778" y="240" width="88" height="44" fill="none" stroke="#C8FF78" stroke-width="1.5" rx="2"/>
      <text x="822" y="271" font-size="26" font-weight="bold" text-anchor="middle">1480</text>
      <text x="778" y="237" font-size="11">ALT  FT</text>
      <text x="778" y="300" font-size="12">V/S  -720</text>
    </g>

    <!-- ── MODE ANNUNCIATOR (top centre) ── -->
    <g fill="#C8FF78" font-family="'Arial Narrow', Arial, sans-serif" opacity="0.92">
      <text x="340" y="108" font-size="16" font-weight="bold" text-anchor="middle">LAND 3</text>
      <text x="450" y="108" font-size="16" text-anchor="middle">|</text>
      <text x="560" y="108" font-size="16" font-weight="bold" text-anchor="middle">CAT III</text>
    </g>

    <!-- ── RADIO ALTITUDE ── -->
    <g fill="#C8FF78" font-family="'Arial Narrow', Arial, sans-serif" opacity="0.92">
      <text x="360" y="518" font-size="18" font-weight="bold" text-anchor="middle">RA  148</text>
      <text x="560" y="518" font-size="14" text-anchor="middle">DH  50</text>
    </g>

  </g><!-- end filter -->

  <!-- Vignette (cockpit window edge darkening) -->
  <rect width="900" height="520" fill="url(#vig)"/>

  <!-- Caption bar at bottom -->
  <rect y="504" width="900" height="16" fill="#000000" opacity="0.35"/>
  <text x="450" y="515" fill="#C8FF78" font-family="'Arial Narrow', Arial, sans-serif"
    font-size="10" text-anchor="middle" opacity="0.6">
    C_HUD_Runway v1.0.0 — Boeing HGS 4000 style · Conformal runway projection · CAT III
  </text>
</svg>
