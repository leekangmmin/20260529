<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <!-- Glow filter for HUD elements -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowText" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Radar gradient -->
    <radialGradient id="radarGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(0,255,65,0.3)"/>
      <stop offset="80%" stop-color="rgba(0,255,65,0.05)"/>
      <stop offset="100%" stop-color="rgba(0,255,65,0)"/>
    </radialGradient>

    <!-- Scanline pattern -->
    <pattern id="scanlines" patternUnits="userSpaceOnUse" width="1200" height="4">
      <rect x="0" y="0" width="1200" height="2" fill="rgba(0,255,65,0.03)"/>
      <rect x="0" y="2" width="1200" height="2" fill="rgba(0,0,0,0.0)"/>
    </pattern>

    <!-- Gradient for HUD text -->
    <linearGradient id="hudTextGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ff41"/>
      <stop offset="50%" stop-color="#7dff9e"/>
      <stop offset="100%" stop-color="#00ff41"/>
    </linearGradient>

    <!-- Phosphor afterglow gradient -->
    <linearGradient id="contrailGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(0,255,65,0)"/>
      <stop offset="30%" stop-color="rgba(0,255,65,0.6)"/>
      <stop offset="100%" stop-color="rgba(0,255,65,0)"/>
    </linearGradient>

    <!-- Aircraft silhouette path -->
    <g id="airplane">
      <path d="M0,-8 L-3,-2 L-12,-2 L-8,0 L-12,2 L-3,2 L0,8 L2,6 L8,6 L6,0 L8,-6 L2,-6 Z" fill="#00ff41" filter="url(#glow)"/>
    </g>

    <!-- Clipping for radar -->
    <clipPath id="radarClip">
      <circle cx="1110" cy="340" r="60"/>
    </clipPath>
  </defs>

  <!-- Background: dark gradient like night sky -->
  <rect x="0" y="0" width="1200" height="400" fill="#0a0a0a"/>

  <!-- Starfield -->
  <g fill="#fff">
    <circle cx="50" cy="30" r="1" opacity="0.8"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="120" cy="80" r="0.8" opacity="0.5"><animate attributeName="opacity" values="0.5;0.1;0.5" dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="200" cy="20" r="1.2" opacity="0.9"><animate attributeName="opacity" values="0.9;0.3;0.9" dur="1.7s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="60" r="0.6" opacity="0.4"><animate attributeName="opacity" values="0.4;0.1;0.4" dur="4.2s" repeatCount="indefinite"/></circle>
    <circle cx="350" cy="120" r="1" opacity="0.7"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="450" cy="35" r="0.9" opacity="0.6"><animate attributeName="opacity" values="0.6;0.1;0.6" dur="3.8s" repeatCount="indefinite"/></circle>
    <circle cx="500" cy="100" r="0.7" opacity="0.5"><animate attributeName="opacity" values="0.5;0.15;0.5" dur="1.9s" repeatCount="indefinite"/></circle>
    <circle cx="550" cy="45" r="1.1" opacity="0.8"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="620" cy="90" r="0.5" opacity="0.3"><animate attributeName="opacity" values="0.3;0.05;0.3" dur="5.1s" repeatCount="indefinite"/></circle>
    <circle cx="700" cy="25" r="1" opacity="0.7"><animate attributeName="opacity" values="0.7;0.3;0.7" dur="2.1s" repeatCount="indefinite"/></circle>
    <circle cx="750" cy="110" r="0.8" opacity="0.6"><animate attributeName="opacity" values="0.6;0.1;0.6" dur="3.4s" repeatCount="indefinite"/></circle>
    <circle cx="800" cy="50" r="0.6" opacity="0.4"><animate attributeName="opacity" values="0.4;0.1;0.4" dur="4.5s" repeatCount="indefinite"/></circle>
    <circle cx="880" cy="30" r="1.3" opacity="0.9"><animate attributeName="opacity" values="0.9;0.2;0.9" dur="1.5s" repeatCount="indefinite"/></circle>
    <circle cx="950" cy="85" r="0.7" opacity="0.5"><animate attributeName="opacity" values="0.5;0.1;0.5" dur="3.7s" repeatCount="indefinite"/></circle>
    <circle cx="1000" cy="15" r="0.9" opacity="0.6"><animate attributeName="opacity" values="0.6;0.2;0.6" dur="2.3s" repeatCount="indefinite"/></circle>
    <circle cx="1050" cy="70" r="0.5" opacity="0.4"><animate attributeName="opacity" values="0.4;0.1;0.4" dur="4.9s" repeatCount="indefinite"/></circle>
    <circle cx="1100" cy="40" r="1" opacity="0.7"><animate attributeName="opacity" values="0.7;0.15;0.7" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="1150" cy="95" r="0.8" opacity="0.5"><animate attributeName="opacity" values="0.5;0.1;0.5" dur="3.3s" repeatCount="indefinite"/></circle>
    <!-- More stars -->
    <circle cx="80" cy="150" r="0.4" opacity="0.3"><animate attributeName="opacity" values="0.3;0.05;0.3" dur="5.5s" repeatCount="indefinite"/></circle>
    <circle cx="180" cy="180" r="0.6" opacity="0.4"><animate attributeName="opacity" values="0.4;0.1;0.4" dur="3.9s" repeatCount="indefinite"/></circle>
    <circle cx="260" cy="160" r="0.5" opacity="0.5"><animate attributeName="opacity" values="0.5;0.15;0.5" dur="2.7s" repeatCount="indefinite"/></circle>
    <circle cx="400" cy="170" r="0.7" opacity="0.6"><animate attributeName="opacity" values="0.6;0.1;0.6" dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="580" cy="155" r="0.4" opacity="0.3"><animate attributeName="opacity" values="0.3;0.05;0.3" dur="4.7s" repeatCount="indefinite"/></circle>
    <circle cx="670" cy="140" r="0.6" opacity="0.4"><animate attributeName="opacity" values="0.4;0.1;0.4" dur="2.9s" repeatCount="indefinite"/></circle>
    <circle cx="820" cy="165" r="0.5" opacity="0.5"><animate attributeName="opacity" values="0.5;0.15;0.5" dur="3.6s" repeatCount="indefinite"/></circle>
    <circle cx="920" cy="145" r="0.7" opacity="0.6"><animate attributeName="opacity" values="0.6;0.1;0.6" dur="2.2s" repeatCount="indefinite"/></circle>
    <circle cx="1080" cy="175" r="0.4" opacity="0.3"><animate attributeName="opacity" values="0.3;0.05;0.3" dur="4.1s" repeatCount="indefinite"/></circle>
  </g>

  <!-- HUD Border Frame -->
  <rect x="15" y="15" width="1170" height="370" rx="8" ry="8" fill="none" stroke="#00ff41" stroke-width="1.5" opacity="0.4"/>
  <rect x="18" y="18" width="1164" height="364" rx="6" ry="6" fill="none" stroke="#00ff41" stroke-width="0.5" opacity="0.2"/>

  <!-- HUD Corner brackets -->
  <g stroke="#00ff41" stroke-width="2" opacity="0.6" filter="url(#glow)">
    <line x1="15" y1="35" x2="15" y2="15"/><line x1="15" y1="15" x2="35" y2="15"/>
    <line x1="1185" y1="35" x2="1185" y2="15"/><line x1="1185" y1="15" x2="1165" y2="15"/>
    <line x1="15" y1="365" x2="15" y2="385"/><line x1="15" y1="385" x2="35" y2="385"/>
    <line x1="1185" y1="365" x2="1185" y2="385"/><line x1="1185" y1="385" x2="1165" y2="385"/>
  </g>

  <!-- Pitch Ladder - perspective grid -->
  <g stroke="#00ff41" stroke-width="0.5" opacity="0.3">
    <!-- Horizontal pitch lines -->
    <line x1="100" y1="170" x2="1100" y2="170"/>
    <line x1="200" y1="185" x2="1000" y2="185"/>
    <line x1="300" y1="200" x2="900" y2="200"/>
    <line x1="400" y1="215" x2="800" y2="215"/>
    <line x1="470" y1="230" x2="730" y2="230"/>
    <line x1="530" y1="245" x2="670" y2="245"/>
    <!-- Vertical perspective lines -->
    <line x1="600" y1="170" x2="600" y2="260"/>
    <line x1="450" y1="185" x2="450" y2="260"/>
    <line x1="750" y1="185" x2="750" y2="260"/>
    <line x1="300" y1="200" x2="300" y2="260"/>
    <line x1="900" y1="200" x2="900" y2="260"/>
  </g>

  <!-- Pitch scale numbers -->
  <g fill="#00ff41" font-family="monospace" font-size="10" opacity="0.3">
    <text x="85" y="173">05</text>
    <text x="1105" y="173">05</text>
    <text x="185" y="188">10</text>
    <text x="1015" y="188">10</text>
    <text x="285" y="203">15</text>
    <text x="915" y="203">15</text>
  </g>

  <!-- Horizon line with dashed center -->
  <g filter="url(#glow)">
    <line x1="100" y1="170" x2="530" y2="170" stroke="#00ff41" stroke-width="1.5" opacity="0.4"/>
    <line x1="670" y1="170" x2="1100" y2="170" stroke="#00ff41" stroke-width="1.5" opacity="0.4"/>
    <line x1="540" y1="170" x2="560" y2="170" stroke="#00ff41" stroke-width="2" opacity="0.6"/>
    <line x1="640" y1="170" x2="660" y2="170" stroke="#00ff41" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- Ground plane - faint green gradient -->
  <polygon points="200,185 1000,185 1100,260 100,260" fill="rgba(0,255,65,0.02)"/>

  <!-- Runway perspective box - animated -->
  <g filter="url(#glow)">
    <polygon points="480,230 720,230 760,260 440,260" fill="none" stroke="#00ff41" stroke-width="1.5" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.7;0.5" dur="3s" repeatCount="indefinite"/>
    </polygon>
    <!-- Runway centerline dashes -->
    <line x1="600" y1="232" x2="600" y2="258" stroke="#00ff41" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
    <!-- Aim point marker -->
    <rect x="585" y="238" width="30" height="4" fill="#00ff41" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.9;0.6" dur="1.5s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Flight Path Vector (FPV diamond) -->
  <g filter="url(#glowStrong)">
    <polygon points="600,200 605,208 600,216 595,208" fill="none" stroke="#00ff41" stroke-width="1.5" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.9;0.6" dur="2s" repeatCount="indefinite"/>
    </polygon>
    <line x1="600" y1="210" x2="600" y2="220" stroke="#00ff41" stroke-width="0.5" opacity="0.3"/>
    <line x1="600" y1="200" x2="600" y2="195" stroke="#00ff41" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- ILS Localizer & Glideslope bars -->
  <g opacity="0.5">
    <rect x="200" y="165" width="8" height="20" fill="#00ff41" rx="1" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0.7;0.4" dur="1.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="250" y="165" width="8" height="20" fill="#00ff41" rx="1" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.5;0.3" dur="1.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="300" y="165" width="8" height="20" fill="#00ff41" rx="1" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.8;0.5" dur="1.8s" repeatCount="indefinite"/>
    </rect>
    <!-- Horizontal glideslope -->
    <rect x="280" y="120" width="40" height="6" fill="#00ff41" rx="1" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0.7;0.4" dur="1.3s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Left Altitude Tape -->
  <g font-family="monospace" fill="#00ff41" opacity="0.7">
    <text x="30" y="130" font-size="11">FL</text>
    <text x="55" y="130" font-size="12" font-weight="bold">050</text>
    <line x1="30" y1="135" x2="100" y2="135" stroke="#00ff41" stroke-width="0.5" opacity="0.3"/>
    <text x="30" y="150" font-size="10" opacity="0.5">048</text>
    <text x="30" y="170" font-size="10" opacity="0.5">047</text>
    <text x="30" y="190" font-size="10" opacity="0.5">046</text>
    <line x1="30" y1="200" x2="35" y2="200" stroke="#00ff41" stroke-width="1" opacity="0.4"/>
    <text x="30" y="213" font-size="11" opacity="0.5">045</text>
    <!-- Altitude trend arrow -->
    <text x="30" y="230" font-size="14" opacity="0.4">↑</text>
  </g>

  <!-- Left tape outline -->
  <rect x="28" y="120" width="75" height="120" rx="2" fill="none" stroke="#00ff41" stroke-width="0.5" opacity="0.15"/>

  <!-- Right Speed Tape -->
  <g font-family="monospace" fill="#00ff41" opacity="0.7">
    <text x="1080" y="130" font-size="12" font-weight="bold">350</text>
    <text x="1120" y="130" font-size="10">kt</text>
    <line x1="1075" y1="135" x2="1150" y2="135" stroke="#00ff41" stroke-width="0.5" opacity="0.3"/>
    <text x="1080" y="150" font-size="10" opacity="0.5">340</text>
    <text x="1080" y="170" font-size="10" opacity="0.5">330</text>
    <text x="1080" y="190" font-size="10" opacity="0.5">320</text>
    <line x1="1075" y1="200" x2="1070" y2="200" stroke="#00ff41" stroke-width="1" opacity="0.4"/>
    <text x="1080" y="213" font-size="11" opacity="0.5">310</text>
  </g>

  <!-- Right tape outline -->
  <rect x="1075" y="120" width="80" height="120" rx="2" fill="none" stroke="#00ff41" stroke-width="0.5" opacity="0.15"/>

  <!-- Heading Scale at top -->
  <g font-family="monospace" fill="#00ff41" opacity="0.6">
    <text x="300" y="45" font-size="10" opacity="0.4">350</text>
    <text x="340" y="45" font-size="10" opacity="0.4">355</text>
    <rect x="370" y="40" width="2" height="10" fill="#00ff41" opacity="0.3"/>
    <text x="380" y="45" font-size="11" font-weight="bold">000</text>
    <rect x="410" y="40" width="2" height="10" fill="#00ff41" opacity="0.3"/>
    <text x="420" y="45" font-size="10" opacity="0.4">005</text>
    <text x="460" y="45" font-size="10" opacity="0.4">010</text>
    <text x="500" y="45" font-size="10" opacity="0.4">015</text>
    <!-- Active heading bug -->
    <polygon points="390,55 395,50 385,50" fill="#00ff41" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.3;0.7" dur="1s" repeatCount="indefinite"/>
    </polygon>
  </g>
  <line x1="280" y1="48" x2="520" y2="48" stroke="#00ff41" stroke-width="0.5" opacity="0.2"/>

  <!-- Bottom status bar -->
  <g font-family="monospace" fill="#00ff41" opacity="0.5">
    <line x1="30" y1="365" x2="1170" y2="365" stroke="#00ff41" stroke-width="0.5"/>
    <text x="40" y="380" font-size="9" opacity="0.4">HGS 4000</text>
    <text x="140" y="380" font-size="9" opacity="0.4">CAT III</text>
    <text x="230" y="380" font-size="9" opacity="0.4">GS ████░░</text>
    <text x="340" y="380" font-size="9" opacity="0.4">LOC ████░░</text>
    <text x="450" y="380" font-size="9" opacity="0.4">DH 0ft</text>
    <text x="1000" y="380" font-size="9" opacity="0.4">FMC LNAV</text>
    <text x="1100" y="380" font-size="9" opacity="0.4">UTC 12:34</text>
  </g>

  <!-- Animated Airplane Flying Across -->
  <g>
    <animateMotion dur="8s" repeatCount="indefinite" path="M-50,120 C100,100 300,90 500,100 C700,110 900,95 1250,105"/>
    <use href="#airplane"/>
    <!-- Contrails -->
    <line x1="-15" y1="0" x2="-60" y2="5" stroke="#00ff41" stroke-width="1" opacity="0.4" filter="url(#glow)"/>
    <line x1="-15" y1="-2" x2="-60" y2="3" stroke="#00ff41" stroke-width="0.5" opacity="0.2"/>
  </g>

  <!-- Second airplane - slower, higher -->
  <g opacity="0.4">
    <g>
      <animateMotion dur="15s" repeatCount="indefinite" path="M1300,70 C1100,60 900,75 700,65 C500,55 300,70 -100,60"/>
      <path d="M0,-5 L-2,-1 L-8,-1 L-5,0 L-8,1 L-2,1 L0,5 L1.5,4 L5.5,4 L4,0 L5.5,-4 L1.5,-4 Z" fill="#7dff9e"/>
      <line x1="-10" y1="0" x2="-40" y2="3" stroke="#7dff9e" stroke-width="0.8" opacity="0.3"/>
    </g>
  </g>

  <!-- Radar Scan (bottom right) -->
  <g>
    <circle cx="1110" cy="340" r="60" fill="none" stroke="#00ff41" stroke-width="0.8" opacity="0.4"/>
    <circle cx="1110" cy="340" r="45" fill="none" stroke="#00ff41" stroke-width="0.3" opacity="0.2"/>
    <circle cx="1110" cy="340" r="30" fill="none" stroke="#00ff41" stroke-width="0.3" opacity="0.2"/>
    <circle cx="1110" cy="340" r="15" fill="none" stroke="#00ff41" stroke-width="0.3" opacity="0.2"/>
    <circle cx="1110" cy="340" r="60" fill="url(#radarGrad)"/>
    <!-- Radar sweep line -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0 1110 340" to="360 1110 340" dur="3s" repeatCount="indefinite"/>
      <line x1="1110" y1="340" x2="1170" y2="340" stroke="#00ff41" stroke-width="2" opacity="0.6" filter="url(#glow)"/>
      <polygon points="1110,340 1165,310 1170,340" fill="rgba(0,255,65,0.15)"/>
    </g>
    <!-- Radar contacts -->
    <circle cx="1090" cy="320" r="3" fill="#00ff41" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1135" cy="305" r="2" fill="#00ff41" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1080" cy="350" r="2.5" fill="#00ff41" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <!-- Radar label -->
    <text x="1080" y="290" font-family="monospace" font-size="7" fill="#00ff41" opacity="0.5">RDR</text>
  </g>

  <!-- Phosphor persistence effect - animated trailing dots -->
  <g fill="rgba(0,255,65,0.08)">
    <circle cx="600" cy="200" r="2"/>
    <circle cx="598" cy="203" r="1.5">
      <animate attributeName="opacity" values="0.08;0;0.08" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="595" cy="205" r="1">
      <animate attributeName="opacity" values="0.05;0;0.05" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Scanline overlay -->
  <rect x="0" y="0" width="1200" height="400" fill="url(#scanlines)" opacity="0.5"/>

  <!-- Vignette effect -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="0%" stop-color="rgba(0,0,0,0)"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0.5)"/>
  </radialGradient>
  <rect x="0" y="0" width="1200" height="400" fill="url(#vignette)"/>

  <!-- Title: C_HUD_Runway with glow -->
  <g filter="url(#glowText)">
    <text x="600" y="310" font-family="monospace" font-size="36" font-weight="bold" fill="url(#hudTextGrad)" text-anchor="middle" letter-spacing="4" opacity="0.9">
      C_HUD_Runway
      <animate attributeName="opacity" values="0.9;0.85;0.9" dur="4s" repeatCount="indefinite"/>
    </text>
  </g>
  <text x="600" y="332" font-family="monospace" font-size="12" fill="#00ff41" text-anchor="middle" letter-spacing="6" opacity="0.5">
    CONFORMAL HGS FOR MSFS
  </text>

  <!-- Subtitle with typewriter effect -->
  <text x="600" y="350" font-family="monospace" font-size="9" fill="#00ff41" text-anchor="middle" opacity="0.3" letter-spacing="2">
    CAT III CERTIFIED · 1241 TESTS · 13 AIRCRAFT PROFILES
  </text>

  <!-- Flicker overlay -->
  <rect x="0" y="0" width="1200" height="400" fill="rgba(0,0,0,0.02)">
    <animate attributeName="opacity" values="0;0.02;0;0.01;0" dur="0.5s" repeatCount="indefinite"/>
  </rect>
</svg>
