name: Build Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: pip install -r requirements-build.txt

      - name: Build EXE with PyInstaller
        run: pyinstaller C_HUD_Install.spec

      - name: Rename output
        shell: pwsh
        run: |
          $version = if ("${{ github.ref_name }}" -match '^v') { "${{ github.ref_name }}" } else { "dev" }
          Rename-Item "dist\C_HUD_Install.exe" "C_HUD_Install_$version.exe"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/C_HUD_Install_*.exe
          name: C_HUD_Runway ${{ github.ref_name }}
          body: |
            ## C_HUD_Runway ${{ github.ref_name }}

            ### Installation
            1. Download `C_HUD_Install_${{ github.ref_name }}.exe`
            2. Run it — MSFS Community folder is detected automatically
            3. Click **설치하기**

            ### Supported Aircraft
            PMDG 737, PMDG 777, Boeing 787, iniBuilds A350, FBW A32NX,
            Headwind A330-900, INI A330, Fenix A320

            > Backups are created automatically before any changes are made.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: C_HUD_Install-${{ github.ref_name }}
          path: dist/C_HUD_Install_*.exe
          retention-days: 30
