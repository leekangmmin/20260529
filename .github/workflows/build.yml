name: Build Installer + WASM

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  # --------------------------------------------------------------------------
  #  Job 1: WASM build (Ubuntu — requires MSFS SDK in cache)
  # --------------------------------------------------------------------------
  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore cached MSFS SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: /tmp/MSFS_SDK
          key: msfs-sdk-wasm-v1

      - name: Check for MSFS SDK
        id: check-sdk
        shell: bash
        run: |
          if [ -d "/tmp/MSFS_SDK/WASM/include" ] && [ -f "/tmp/MSFS_SDK/WASM/include/MSFS/MSFS.h" ]; then
            echo "SDK_FOUND=true" >> "$GITHUB_OUTPUT"
          else
            echo "SDK_FOUND=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build WASM (with SDK)
        if: steps.check-sdk.outputs.SDK_FOUND == 'true'
        shell: bash
        run: |
          chmod +x build_wasm.sh
          ./build_wasm.sh --sdk-path /tmp/MSFS_SDK
        env:
          CLANG: clang++-17

      - name: Verify WASM output
        id: wasm-result
        shell: bash
        run: |
          if [ -f "panel/C_HUD_Runway.wasm" ]; then
            echo "WASM_BUILT=true" >> "$GITHUB_OUTPUT"
          else
            echo "WASM_BUILT=false" >> "$GITHUB_OUTPUT"
            mkdir -p panel
            touch panel/C_HUD_Runway.wasm
          fi

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: C_HUD_Runway-wasm
          path: panel/C_HUD_Runway.wasm
          retention-days: 90
          if-no-files-found: warn

  # --------------------------------------------------------------------------
  #  Job 2: Build installer EXE on Windows + Create GitHub Release
  # --------------------------------------------------------------------------
  build-installer:
    runs-on: windows-latest
    needs: build-wasm

    steps:
      - uses: actions/checkout@v4

      - name: Download WASM
        uses: actions/download-artifact@v4
        with:
          name: C_HUD_Runway-wasm
          path: panel/

      - name: Check WASM
        shell: pwsh
        run: |
          if (Test-Path "panel/C_HUD_Runway.wasm") {
            $size = (Get-Item "panel/C_HUD_Runway.wasm").Length
            Write-Host "WASM OK: $size bytes"
          } else {
            Write-Host "::warning::WASM not found"
          }

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install -r requirements-build.txt

      - name: Build EXE with PyInstaller
        shell: pwsh
        run: |
          python -m PyInstaller C_HUD_Install.spec 2>&1

      - name: Stage release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets
          # Always include WASM
          Copy-Item "panel/C_HUD_Runway.wasm" "release-assets/"
          Write-Host "Staged WASM: C_HUD_Runway.wasm"

          # Include installer EXE if available
          if (Test-Path "dist/C_HUD_Install.exe") {
            $version = "${{ github.ref_name }}"
            Copy-Item "dist/C_HUD_Install.exe" "release-assets/C_HUD_Install.exe"
            Copy-Item "dist/C_HUD_Install.exe" "release-assets/C_HUD_Install_$version.exe"
            Write-Host "Staged EXEs: C_HUD_Install.exe, C_HUD_Install_$version.exe"
          } else {
            Write-Host "::warning::dist/C_HUD_Install.exe not found — only WASM will be released"
          }

          # Verify
          Get-ChildItem "release-assets/" | Select-Object Name, Length

      - name: Create Release & Upload Assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          echo "Releasing ${VERSION} to ${REPO}..."

          # Check if release already exists
          if gh release view "${VERSION}" --repo "${REPO}" &>/dev/null; then
            echo "Release ${VERSION} already exists — uploading assets..."
            gh release upload "${VERSION}" release-assets/* --repo "${REPO}" --clobber 2>&1
          else
            echo "Creating new release ${VERSION}..."
            gh release create "${VERSION}" \
              --repo "${REPO}" \
              --title "C_HUD_Runway ${VERSION}" \
              --notes-file - <<'EONOTES'
            ## C_HUD_Runway ${{ github.ref_name }}

            Conformal Boeing HGS-style HUD for Microsoft Flight Simulator 2020 and 2024.

            ### ⬇️ Downloads
            - **C_HUD_Install.exe** — Windows installer (latest)
            - **C_HUD_Install_${{ github.ref_name }}.exe** — Windows installer (versioned)
            - **C_HUD_Runway.wasm** — WASM gauge module (for manual installs)

            ### ✈️ Supported Aircraft
            PMDG 737-800/700/MAX | PMDG 777-300ER | Asobo/WT 787-10
            iniBuilds A350 | FBW A32NX | FBW A380 | Fenix A320
            Headwind A330-900 | INI A330
EONOTES
            gh release upload "${VERSION}" release-assets/* --repo "${REPO}" 2>&1
          fi

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: C_HUD_Install-${{ github.ref_name }}
          path: release-assets/
          retention-days: 30
