; ============================================================================
;  panel.cfg  –  Conformal HUD Runway Symbology
;  Phase 2:  C++ WASM data pipeline  +  HTML/JS Canvas overlay renderer
; ============================================================================
;  Place this file inside the aircraft's  panel/  folder alongside
;  C_HUD_Runway.wasm and the HUD/ subdirectory.
; ============================================================================

[VCockpit01]
size_mm        = 1024, 1024
pixel_size     = 1024, 1024
texture        = $HUD_Overlay

; ---- C++ WASM gauge (Phase 1 – SimVar polling & logging) ----------------
gauge00 = C_HUD_Runway!Gauge_ConformalHUD,  0, 0, 1024, 1024

; ---- HTML/JS Canvas overlay  (Phase 2 – transparent HUD rendering) ------
;  Renders as a transparent overlay on the VC panel texture.
;  For true conformal HUD positioning, the 3-D model must place the
;  panel polygon at the HUD combiner glass position.
htmlgauge00 = HUD/hud_overlay.html,  0, 0, 1024, 1024
